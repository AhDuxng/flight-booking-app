services:
  - type: web
    name: flight-booking-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: true
      - key: BODY_LIMIT
        value: 100kb
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: AUTH_RATE_LIMIT
        value: 20
      - key: PUBLIC_RATE_LIMIT
        value: 100
      - key: FLIGHT_SEARCH_CACHE_TTL_SECONDS
        value: 15
      - key: SEAT_CLEANUP_INTERVAL_MS
        value: 60000
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GEMINI_REQUEST_TIMEOUT_MS
        value: 15000
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEYS
        sync: false
      - key: FRONTEND_URL
        sync: false
